name: Update Polla Backend

on:
  workflow_dispatch:
  repository_dispatch:
    types: [update-polla-backend]
  schedule:
    # GitHub scheduled workflows can be delayed or skipped during high-load windows.
    # Use the standard every-5-minutes cron form for maximum scheduler compatibility.
    - cron: "*/5 * * * *"

concurrency:
  group: update-polla-backend
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update results, ranking and alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POLLA_SMTP_USER: ${{ secrets.POLLA_SMTP_USER }}
          POLLA_SMTP_PASSWORD: ${{ secrets.POLLA_SMTP_PASSWORD }}
        run: python scripts/update_app_backend.py
